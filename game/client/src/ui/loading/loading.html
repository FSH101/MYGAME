<div class="loading-screen" role="status">
  <div class="loading-panel">
    <h1 class="loading-title">Wasteland: Survival</h1>
    <div class="progress" aria-live="polite">
      <div class="progress-bar"><span class="progress-value"></span></div>
      <div class="progress-label">0%</div>
    </div>
    <ul class="stage-log"></ul>
    <div class="error-section collapsed">
      <button class="error-toggle" type="button">Показать ошибки</button>
      <pre class="error-log" tabindex="0"></pre>
    </div>
    <div class="loading-actions">
      <button class="retry hidden" data-action="retry" type="button">Повторить</button>
      <button class="copy" data-action="copy" type="button">Скопировать лог</button>
    </div>
  </div>
</div>
